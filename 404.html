<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Page introuvable (404) | SKJ Community</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    :root{ --bg-soft:#f6f5fc; --ink:#121319; --text-dim:#5f626e; --accent:#7b5cff;
      --grad:linear-gradient(135deg,#9b86ff 0%,#7b5cff 100%); --border:rgba(18,19,25,.10);
      --shadow:0 18px 50px rgba(20,21,45,.12); --radius:18px; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg-soft); color:var(--ink); min-height:100vh; display:flex; align-items:center;
      justify-content:center; padding:24px; line-height:1.55; }
    .card{ background:#fff; border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:var(--shadow); max-width:520px; width:100%; padding:48px 40px; text-align:center; }
    .logo{ width:64px; height:64px; object-fit:contain; margin:0 auto 20px; display:block; }
    .code{ font-size:3.4rem; font-weight:800; letter-spacing:-.02em;
      background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1; margin-bottom:8px; }
    h1{ font-size:1.4rem; font-weight:800; margin-bottom:12px; letter-spacing:-.01em; }
    p{ color:var(--text-dim); font-size:1.02rem; margin-bottom:10px; }
    .btn{ display:inline-flex; align-items:center; justify-content:center; gap:9px; padding:14px 28px;
      border-radius:999px; font-size:1rem; font-weight:700; text-decoration:none; color:#fff;
      background:var(--grad); box-shadow:0 14px 34px rgba(123,92,255,.36);
      transition:transform .25s ease, box-shadow .3s ease; margin-top:22px; }
    .btn:hover{ transform:translateY(-3px); box-shadow:0 18px 42px rgba(123,92,255,.5); }
    .brand{ margin-top:28px; font-size:.78rem; letter-spacing:.04em; color:var(--text-dim); text-transform:uppercase; font-weight:700; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/logo.png" alt="SKJ Community" />
    <div class="code">404</div>
    <h1>Oups, cette page n'existe pas</h1>
    <p>Le lien est peut-être erroné ou la page a été déplacée. Pas d'inquiétude, on vous ramène en terrain connu&nbsp;!</p>
    <a class="btn" href="/">← Retour à l'accueil</a>
    <p class="brand">SKJ Community · Caen &amp; Normandie</p>
  </main>
</body>
</html>
